cache:
  pip: true
  directories:
    - $HOME/releng-tool-cache
    - $HOME/releng-tool-dl

matrix:
  include:
    # vulkan-samples
    - os: linux
      env: ROOT_DIR=vulkan-samples
      language: generic
      dist: bionic
      before_install:
        - sudo apt-get install libwayland-dev
        - sudo python -m pip install --upgrade pip wheel virtualenv
        - virtualenv venv -p python
        - source venv/bin/activate
    - os: windows
      env: ROOT_DIR=vulkan-samples
      language: cpp
      before_install:
        - choco install windowsdriverkit10
        - choco install python3 --params "/InstallDir:C:\Python"
        - export PATH="/c/Python:/c/Python/Scripts:$PATH"
        - python -m pip install --upgrade pip wheel virtualenv
        - virtualenv venv
        - venv/Scripts/activate.bat

install:
  - pip install git+https://github.com/releng-tool/releng-tool.git

before_script:
  - python --version
  - env | sort

script:
  - |
      releng-tool \
        --root-dir $ROOT_DIR \
        --cache-dir $HOME/releng-tool-cache \
        --dl-dir $HOME/releng-tool-dl \
        --debug \
        --jobs 1

after_script:
  - find $ROOT_DIR/output/target 2>/dev/null

notifications:
  email: false
